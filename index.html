<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="description" content="Echoes of the Lighthouse — A narrative mystery roguelite. Keep the light burning. Do not let it go dark." />

  <!-- Open Graph -->
  <meta property="og:title" content="Echoes of the Lighthouse" />
  <meta property="og:description" content="A narrative mystery roguelite. Keep the light burning." />
  <meta property="og:type" content="website" />

  <!-- Favicon: simple lighthouse SVG inlined -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏯</text></svg>" />

  <title>Echoes of the Lighthouse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0d0d0f;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    #app { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    canvas { display: block; image-rendering: pixelated; touch-action: none; }
    body { overscroll-behavior: none; }

    /* Loading overlay */
    #loading {
      position: fixed; inset: 0;
      background: #0d0d0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; z-index: 100;
      transition: opacity 0.6s ease;
      font-family: 'Courier New', monospace; color: #a89060;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 { font-size: 1.4rem; letter-spacing: 0.2em; }
    #loading-bar {
      width: 240px; height: 4px;
      background: #2a2a30; border-radius: 2px; overflow: hidden;
    }
    #loading-bar-fill {
      height: 100%; width: 0%;
      background: #a89060; border-radius: 2px;
      transition: width 0.3s ease;
    }
    #loading-status { font-size: 0.75rem; opacity: 0.7; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas" role="application" aria-label="Echoes of the Lighthouse — use keyboard or touch to play"></canvas>
  </div>
  <div id="loading">
    <h1>🏮 ECHOES OF THE LIGHTHOUSE</h1>
    <div id="loading-bar"><div id="loading-bar-fill"></div></div>
    <div id="loading-status">Initialising...</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
