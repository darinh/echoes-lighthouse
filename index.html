<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="description" content="Echoes of the Lighthouse — A narrative mystery roguelite. Keep the light burning. Do not let it go dark." />
  <link rel="manifest" href="/echoes-lighthouse/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Echoes" />

  <!-- Open Graph -->
  <meta property="og:title" content="Echoes of the Lighthouse" />
  <meta property="og:description" content="A narrative mystery roguelite. Keep the light burning." />
  <meta property="og:type" content="website" />

  <!-- Favicon: simple lighthouse SVG inlined -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏯</text></svg>" />

  <title>Echoes of the Lighthouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Loading screen -->
    <div id="loading">
      <div id="loading-inner">
        <div id="loading-title">ECHOES OF THE LIGHTHOUSE</div>
        <div id="loading-bar"><div id="loading-bar-fill"></div></div>
        <div id="loading-status">Loading...</div>
      </div>
    </div>

    <!-- Game container -->
    <div id="game-container">
      <!-- Canvas: visuals/atmosphere only (background, weather, map) -->
      <canvas id="game-canvas" role="application" aria-label="Echoes of the Lighthouse — use keyboard or touch to play"></canvas>

      <!-- HTML UI overlay: all panels, buttons, text -->
      <div id="game-ui">
        <!-- HUD bar -->
        <div id="hud"></div>

        <!-- Main content area (flex row/column via CSS) -->
        <div id="main-area">
          <div id="content-panel"></div>
          <div id="action-panel"></div>
        </div>

        <!-- Overlay panels: journal, codex, map, vision, death, ending -->
        <div id="overlay-panel" class="hidden"></div>

        <!-- Notifications: hints, achievement toasts -->
        <div id="notifications"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
