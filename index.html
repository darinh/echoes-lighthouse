<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="description" content="Echoes of the Lighthouse — A narrative mystery roguelite. Keep the light burning. Do not let it go dark." />

  <!-- Open Graph -->
  <meta property="og:title" content="Echoes of the Lighthouse" />
  <meta property="og:description" content="A narrative mystery roguelite. Keep the light burning." />
  <meta property="og:type" content="website" />

  <!-- Favicon: simple lighthouse SVG inlined -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏯</text></svg>" />

  <title>Echoes of the Lighthouse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0d0d0f;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    #app { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    canvas { display: block; image-rendering: pixelated; touch-action: none; }
    /* Prevent iOS bounce */
    body { overscroll-behavior: none; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas" role="application" aria-label="Echoes of the Lighthouse — use keyboard or touch to play"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
