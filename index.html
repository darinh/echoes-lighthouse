<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Echoes of the Lighthouse — a narrative mystery roguelite" />
  <title>Echoes of the Lighthouse</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    body { display: flex; justify-content: center; align-items: center; }
    #game-canvas { display: block; image-rendering: pixelated; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: #0a0a0f; color: #8899aa; font-family: monospace; font-size: 14px;
      gap: 12px; transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-bar { width: 200px; height: 2px; background: #1a2030; }
    #loading-bar-fill { height: 100%; background: #4488cc; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <div id="loading">
    <span>ECHOES OF THE LIGHTHOUSE</span>
    <div id="loading-bar"><div id="loading-bar-fill"></div></div>
    <span id="loading-status">Initialising...</span>
  </div>
  <canvas id="game-canvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
