name: Release & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write  # tag + release creation
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  typecheck-and-test:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run typecheck
      - run: npm run test

  tag-and-release:
    name: Tag & Release
    needs: typecheck-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}" || echo "Tag already exists, skipping"
          git push origin "v${{ steps.version.outputs.version }}" || echo "Tag push skipped"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}'
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: `v${version}`,
                name: `v${version}`,
                generate_release_notes: true,
              })
              console.log(`Release v${version} created`)
            } catch (e) {
              console.log(`Release skipped: ${e.message}`)
            }

  build-and-deploy:
    name: Deploy to Pages
    needs: tag-and-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
