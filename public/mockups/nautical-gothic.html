<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Echoes of the Lighthouse — UI Mockup</title>
<!--
  ╔═══════════════════════════════════════════════════════════════╗
  ║  ECHOES OF THE LIGHTHOUSE — AAAA Mobile-First UI Mockup      ║
  ║                                                               ║
  ║  Aesthetic: Deep Nautical Gothic                              ║
  ║  Metaphor: Ship's bridge at 3 AM, one oil lamp burning        ║
  ║                                                               ║
  ║  This is a design reference for downstream implementation.    ║
  ║  Every screen, every component, every interaction the game    ║
  ║  needs is here. Open in a browser. Click through everything.  ║
  ║                                                               ║
  ║  Coverage: 17 screens (GDD §5a–§5h, §6, §7, §10)            ║
  ╚═══════════════════════════════════════════════════════════════╝
-->
<style>
/* ═══════════════════════════════════════════════════════════════
   TOKENS — The palette of a ship's bridge at night
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* Depths — darkest to lightest surface */
  --void: #040810;
  --abyss: #081018;
  --hull: #0c1a28;
  --deck: #142232;
  --bulkhead: #1c2e42;
  --gunmetal: #26394f;

  /* The one warm thing — lantern light */
  --lantern: #c8a96e;
  --lantern-hot: #e4c47e;
  --lantern-glow: rgba(200,169,110,0.15);
  --lantern-dim: #8a7448;

  /* Signal colors */
  --kelp: #4a9e8a;        /* safe / positive */
  --kelp-dim: #2d6658;
  --rust: #9e5a5a;         /* danger */
  --rust-dim: #6b3d3d;
  --resonance: #5b8ebd;    /* resonance / emotional */
  --resonance-dim: #2e4f6e;
  --corruption: #6a9e6d;   /* corruption green */
  --night-ink: #3d3358;    /* night purple */

  /* Text — steel in lamplight */
  --bone: #d8dfe8;
  --pewter: #9baab8;
  --slate: #6a7a8c;
  --graphite: #485868;

  /* Structure */
  --rivet: #2a3c52;
  --seam: #1a2a3c;
  --hairline: rgba(138,155,176,0.12);

  /* Typography — three voices */
  --font-log: "Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,"Georgia",serif;
  --font-bridge: "Avenir Next","Segoe UI","Trebuchet MS",system-ui,sans-serif;
  --font-signal: "Menlo","Consolas","SF Mono","Courier New",monospace;

  /* Spatial rhythm */
  --gap-xs: 4px;
  --gap-sm: 8px;
  --gap-md: 14px;
  --gap-lg: 22px;
  --gap-xl: 36px;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-pill: 999px;
}

/* ═══════════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { 
  height:100%;
  background: var(--void);
  color: var(--pewter);
  font-family: var(--font-bridge);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
body {
  min-height:100%;
  background:
    radial-gradient(ellipse 60% 40% at 20% 8%, rgba(200,169,110,0.07), transparent),
    radial-gradient(ellipse 50% 50% at 85% 5%, rgba(74,158,138,0.04), transparent),
    linear-gradient(170deg, var(--abyss) 0%, var(--void) 60%);
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
button { font:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input[type="range"] { accent-color: var(--lantern); }
:focus-visible { outline: 2px solid var(--lantern); outline-offset: 2px; }

/* ═══════════════════════════════════════════════════════════════
   SHELL — The app frame
   ═══════════════════════════════════════════════════════════════ */
#app {
  max-width: 1080px;
  margin: 0 auto;
  padding: var(--gap-sm);
  display: flex;
  flex-direction: column;
  gap: var(--gap-sm);
  height: 100dvh; /* viewport-locked — no page scroll */
  height: 100vh;  /* fallback for older browsers */
  overflow: hidden;
}

/* ── State Navigator ─────────────────────────────────────────── */
.nav-rail {
  display: flex;
  gap: var(--gap-xs);
  overflow-x: auto;
  padding: var(--gap-xs) 0;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  flex-shrink: 0;
}
.nav-rail::-webkit-scrollbar { display:none; }
.nav-pill {
  flex-shrink: 0;
  padding: 6px 13px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--seam);
  background: var(--abyss);
  color: var(--slate);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
  transition: all 160ms ease;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.nav-pill:hover { border-color:var(--rivet); color:var(--pewter); }
.nav-pill[aria-current="true"] {
  border-color: var(--lantern);
  color: var(--lantern-hot);
  background: rgba(200,169,110,0.08);
}

/* ── Screen Container ────────────────────────────────────────── */
.screen {
  flex: 1;
  min-height: 0; /* crucial: allows flex child to shrink below content height */
  border: 1px solid var(--seam);
  border-radius: var(--radius);
  background: linear-gradient(178deg, rgba(12,26,40,0.92), rgba(8,16,24,0.96));
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}
.screen-pad {
  padding: var(--gap-md);
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════════════
   COMPONENTS — Reusable across screens
   ═══════════════════════════════════════════════════════════════ */

/* ── Action Button (the signature element) ───────────────────── */
.act {
  display: block;
  width: 100%;
  text-align: left;
  padding: 7px 12px;
  border: 1px solid rgba(200,169,110,0.22);
  border-left: 4px solid var(--lantern);
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, rgba(200,169,110,0.12) 0%, rgba(200,169,110,0.03) 100%);
  color: var(--bone);
  font-size: 12px;
  line-height: 1.3;
  transition: all 160ms ease;
  min-height: 36px;
}
.act:hover, .act:focus-visible {
  background: linear-gradient(135deg, rgba(200,169,110,0.22) 0%, rgba(200,169,110,0.08) 100%);
  border-color: rgba(200,169,110,0.4);
  transform: translateY(-1px);
}
.act:active { transform: translateY(0); }
.act.safe   { border-left-color:var(--kelp); }
.act.danger { border-left-color:var(--rust); }
.act.ghost  { background:transparent; border-color:var(--seam); border-left-color:var(--rivet); color:var(--slate); }
.act.ghost:hover { border-color:var(--rivet); color:var(--pewter); }
.act .cost  { float:right; font-size:11px; color:var(--rust); font-family:var(--font-signal); }
.act .gain  { float:right; font-size:11px; color:var(--kelp); font-family:var(--font-signal); }
.act .sub   { display:block; font-size:11px; color:var(--slate); margin-top:2px; }
.act[disabled] { opacity:0.35; pointer-events:none; }

/* ── Panel ───────────────────────────────────────────────────── */
.panel {
  border: 1px solid var(--seam);
  border-radius: var(--radius-sm);
  background: rgba(8,16,24,0.6);
  padding: var(--gap-md);
}
.panel-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--lantern-dim);
  margin-bottom: var(--gap-sm);
}
.panel-title {
  font-family: var(--font-log);
  font-size: 17px;
  color: var(--bone);
  margin-bottom: var(--gap-sm);
}

/* ── Bar (progress / stat) ───────────────────────────────────── */
.bar { height:6px; border-radius:3px; background:var(--hull); overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition: width 400ms ease; }
.bar-fill.amber { background: linear-gradient(90deg,var(--lantern-dim),var(--lantern)); }
.bar-fill.teal  { background: linear-gradient(90deg,var(--kelp-dim),var(--kelp)); }
.bar-fill.blue  { background: linear-gradient(90deg,var(--resonance-dim),var(--resonance)); }
.bar-fill.red   { background: linear-gradient(90deg,var(--rust-dim),var(--rust)); }

/* ── Entry row ───────────────────────────────────────────────── */
.entry {
  border-left: 3px solid var(--seam);
  padding: var(--gap-sm) var(--gap-md);
  background: rgba(4,8,16,0.5);
  margin-bottom: var(--gap-xs);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.entry b { display:block; color:var(--bone); font-size:13px; font-weight:500; }
.entry span { font-size:12px; color:var(--slate); }
.entry.sealed { border-left-color: var(--lantern); }
.entry.active { border-left-color: var(--lantern-dim); }

/* ── Tabs ────────────────────────────────────────────────────── */
.tabs {
  display: flex;
  gap: var(--gap-xs);
  margin-bottom: var(--gap-md);
}
.tab {
  flex: 1;
  padding: 8px 6px;
  text-align: center;
  font-size: 11px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  border-radius: var(--radius-sm);
  border: 1px solid var(--seam);
  background: var(--abyss);
  color: var(--slate);
  transition: all 140ms ease;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tab:hover { color:var(--pewter); border-color:var(--rivet); }
.tab.on {
  color: var(--lantern-hot);
  border-color: var(--lantern);
  background: rgba(200,169,110,0.06);
}

/* ── HUD Strip ───────────────────────────────────────────────── */
.hud {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: var(--gap-xs);
  padding: var(--gap-sm);
  border: 1px solid var(--seam);
  border-radius: var(--radius-sm);
  background: rgba(4,8,16,0.7);
}
.hud-cell {
  min-height: 38px;
  display:flex; flex-direction:column; justify-content:center;
}
.hud-cell .label { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--lantern-dim); }
.hud-cell .value { font-size:13px; color:var(--bone); font-family:var(--font-signal); }
.hud-cell .hearts { color:var(--rust); font-size:14px; letter-spacing:2px; }

/* ── Chip / Hotspot ──────────────────────────────────────────── */
.chips { display:flex; flex-wrap:wrap; gap:var(--gap-xs); }
.chip {
  padding: 4px 10px;
  border: 1px solid var(--rivet);
  border-radius: var(--radius-pill);
  font-size: 11px;
  color: var(--pewter);
  cursor: pointer;
  transition: all 140ms ease;
}
.chip:hover { border-color:var(--lantern); color:var(--lantern-hot); }

/* ── NPC Card ────────────────────────────────────────────────── */
.npc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border: 1px solid var(--seam);
  border-radius: var(--radius-sm);
  background: rgba(8,16,24,0.5);
  margin-bottom: var(--gap-xs);
  cursor: pointer;
  transition: background 140ms ease;
  min-height: 44px;
}
.npc-row:hover { background:rgba(20,34,50,0.6); }
.npc-name { font-size:13px; color:var(--bone); }
.npc-sub { font-size:11px; color:var(--slate); }
.npc-dots { color:var(--lantern); font-size:11px; letter-spacing:2px; }
.npc-ready { color:var(--lantern); text-shadow:0 0 6px rgba(200,169,110,0.5); }

/* ── Map Node ────────────────────────────────────────────────── */
.map-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--gap-sm);
}
.map-node {
  min-height: 56px;
  border: 1px solid var(--seam);
  border-radius: var(--radius-sm);
  background: rgba(8,16,24,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 11px;
  color: var(--slate);
  padding: var(--gap-sm);
  cursor: pointer;
  transition: all 160ms ease;
}
.map-node:hover { background:rgba(20,34,50,0.5); border-color:var(--rivet); color:var(--pewter); }
.map-node.here {
  border-color: var(--lantern);
  color: var(--lantern-hot);
  box-shadow: 0 0 0 1px rgba(200,169,110,0.2), inset 0 0 12px rgba(200,169,110,0.06);
}
.map-node.fog { color:var(--graphite); border-style:dashed; }
.map-conn { font-size:9px; color:var(--graphite); text-align:center; padding:2px 0; }

/* ── Insight Card ────────────────────────────────────────────── */
.insight-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--gap-sm); }
.insight-card {
  border: 1px solid var(--seam);
  border-radius: var(--radius-sm);
  padding: var(--gap-sm) var(--gap-md);
  background: rgba(8,16,24,0.5);
  text-align: center;
}
.insight-card.sealed {
  border-color: var(--lantern);
  box-shadow: 0 0 8px rgba(200,169,110,0.12);
}
.insight-card .ic-icon { font-family:var(--font-signal); font-size:18px; color:var(--lantern); margin-bottom:4px; }
.insight-card .ic-title { font-size:11px; color:var(--bone); margin-bottom:2px; }
.insight-card .ic-status { font-size:10px; color:var(--slate); }
.insight-card.sealed .ic-status { color:var(--lantern-dim); }

/* ── Seal Card (archive desk) ────────────────────────────────── */
.seal-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--seam);
  border-radius: var(--radius-sm);
  background: rgba(4,8,16,0.5);
  margin-bottom: var(--gap-xs);
  min-height: 44px;
}
.seal-row.can-seal { cursor:pointer; border-color:var(--rivet); }
.seal-row.can-seal:hover { background:rgba(20,34,50,0.5); }
.seal-row.done { opacity:0.5; }
.seal-title { font-size:12px; color:var(--bone); }
.seal-cost { font-size:11px; font-family:var(--font-signal); color:var(--lantern); }
.seal-cost.locked { color:var(--graphite); }

/* ── Dial (signal puzzle) ────────────────────────────────────── */
.dials { display:flex; gap:var(--gap-lg); justify-content:center; }
.dial { display:flex; flex-direction:column; align-items:center; gap:var(--gap-xs); }
.dial-btn {
  width:44px; height:44px;
  border:1px solid var(--rivet);
  border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  color:var(--pewter);
  font-size:16px;
  transition: all 140ms ease;
}
.dial-btn:hover { border-color:var(--lantern); color:var(--lantern); }
.dial-val { font-family:var(--font-signal); font-size:28px; color:var(--lantern-hot); }

/* ── Codex / Archive entry ───────────────────────────────────── */
.codex-entry {
  border: 1px solid var(--seam);
  border-radius: var(--radius-sm);
  padding: var(--gap-sm) var(--gap-md);
  background: rgba(8,16,24,0.5);
  margin-bottom: var(--gap-xs);
}
.codex-entry.unlocked { border-left: 3px solid var(--lantern-dim); }
.codex-entry .ce-title { font-size:12px; color:var(--bone); }
.codex-entry .ce-body { font-size:11px; color:var(--slate); margin-top:2px; }
.codex-bar { display:flex; align-items:center; gap:var(--gap-sm); margin-bottom:var(--gap-sm); }
.codex-bar .label { font-size:11px; color:var(--slate); width:80px; flex-shrink:0; }

/* ── Settings Row ────────────────────────────────────────────── */
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--gap-md);
  padding: var(--gap-sm) 0;
  border-bottom: 1px solid var(--hairline);
}
.setting-row label { font-size:13px; color:var(--bone); flex-shrink:0; }
.setting-row input[type="range"] { flex:1; max-width:160px; }

/* ═══════════════════════════════════════════════════════════════
   ATMOSPHERIC ELEMENTS
   ═══════════════════════════════════════════════════════════════ */

/* ── Starfield ───────────────────────────────────────────────── */
.starfield { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.star {
  position:absolute;
  width:2px; height:2px;
  border-radius:50%;
  background: rgba(206,215,227,0.8);
  animation: twinkle var(--t,4s) ease-in-out infinite;
  animation-delay: var(--d,0s);
}
@keyframes twinkle {
  0%,100% { opacity:0.15; transform:scale(0.8); }
  50% { opacity:0.85; transform:scale(1.3); }
}

/* ── Lighthouse beam ─────────────────────────────────────────── */
.beam-wrap {
  position:absolute; inset:0;
  pointer-events:none;
  transform-origin: 50% 65%;
  animation: sweep 10s ease-in-out infinite alternate;
}
.beam-wrap::before {
  content:"";
  position:absolute;
  left:42%; top:12%;
  width: min(80vw,400px);
  height: min(80vw,400px);
  background: conic-gradient(from 25deg, transparent 0deg 315deg, rgba(200,169,110,0.45) 340deg 360deg);
  filter: blur(1px);
}
@keyframes sweep { from{transform:rotate(-16deg)} to{transform:rotate(20deg)} }

/* ── Vignette ────────────────────────────────────────────────── */
.vignette {
  position:absolute; inset:0;
  pointer-events:none;
  background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 20%, rgba(4,8,16,0.85) 100%);
}

/* ── Lighthouse silhouette ───────────────────────────────────── */
.lighthouse-sil {
  position: absolute;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  pointer-events: none;
  opacity: 0.7;
}
.lighthouse-sil .tower {
  width: 44px; height: 160px;
  margin: 0 auto;
  border: 1px solid rgba(138,155,176,0.3);
  border-bottom: 4px solid rgba(138,155,176,0.35);
  background: linear-gradient(180deg, rgba(200,169,110,0.08), transparent 60%);
  position: relative;
}
.lighthouse-sil .lantern-room {
  position: absolute;
  top: -14px; left: -6px; right: -6px;
  height: 16px;
  border: 1px solid rgba(138,155,176,0.3);
  background: rgba(200,169,110,0.15);
}
.lighthouse-sil .base {
  width: 62px; height: 20px;
  margin: 0 auto;
  border: 1px solid rgba(138,155,176,0.25);
  border-top: none;
  background: rgba(12,26,40,0.4);
}

/* ── Scanlines (CRT) ────────────────────────────────────────── */
.scanlines {
  position:absolute; inset:0;
  pointer-events:none;
  background: repeating-linear-gradient(0deg, rgba(138,155,176,0.03) 0px, rgba(138,155,176,0.03) 1px, transparent 1px, transparent 4px);
}

/* ── Portrait (ASCII) ────────────────────────────────────────── */
.portrait {
  width:60px; min-height:60px;
  border:1px solid var(--rivet);
  border-radius: var(--radius-sm);
  background: rgba(4,8,16,0.6);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-signal);
  font-size:10px; line-height:1.15;
  color:var(--lantern);
  white-space:pre;
  flex-shrink:0;
}

/* ── Full-screen cinematic ───────────────────────────────────── */
.cinematic {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.cin-card {
  position:relative; z-index:1;
  width: min(640px,100%);
  margin: var(--gap-md);
  border: 1px solid var(--seam);
  border-radius: var(--radius);
  background: rgba(6,12,20,0.82);
  backdrop-filter: blur(4px);
  padding: var(--gap-lg);
  max-height: 80%;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--hull) transparent;
}
.cin-card h2 {
  font-family: var(--font-log);
  font-size: clamp(20px, 5vw, 32px);
  color: var(--bone);
  margin-bottom: var(--gap-sm);
  letter-spacing: -0.01em;
}
.cin-card .subtitle {
  font-size: 13px;
  color: var(--pewter);
  margin-bottom: var(--gap-md);
  line-height: 1.6;
}
.cin-card .actions { display:grid; gap:var(--gap-sm); }

/* ── Centered stage (death, vision, etc.) ────────────────────── */
.stage {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.stage-card {
  position:relative; z-index:1;
  width: min(580px,100%);
  margin: var(--gap-md);
  border: 1px solid var(--seam);
  border-radius: var(--radius);
  background: rgba(6,12,20,0.82);
  padding: var(--gap-lg);
  text-align: center;
  max-height: 85%;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--hull) transparent;
}
.stage-card h2 {
  font-family: var(--font-log);
  font-size: clamp(18px,4.5vw,28px);
  color: var(--lantern);
  margin-bottom: var(--gap-sm);
}
.stage-card .desc {
  font-family: var(--font-signal);
  font-size: 13px;
  color: var(--pewter);
  line-height: 1.7;
  margin-bottom: var(--gap-md);
}

/* ── NPC Trust indicator (abstract dots) ─────────────────────── */
.trust-dots { display:flex; gap:3px; }
.trust-dot {
  width:8px; height:8px;
  border-radius:50%;
  border:1px solid var(--rivet);
}
.trust-dot.filled { background:var(--lantern); border-color:var(--lantern); }
.trust-dot.half { background:var(--lantern-dim); border-color:var(--lantern-dim); }

/* ── Overlay ─────────────────────────────────────────────────── */
.overlay-bg {
  position:fixed; inset:0;
  background: rgba(4,8,16,0.92);
  display:flex; align-items:center; justify-content:center;
  z-index:50;
}
.overlay-panel {
  width: min(400px,90vw);
  border:1px solid var(--rivet);
  border-radius:var(--radius);
  background: var(--hull);
  padding: var(--gap-lg);
}
.overlay-panel h3 {
  font-family:var(--font-log);
  font-size:18px;
  color:var(--bone);
  margin-bottom:var(--gap-md);
}

/* ── Scroll container ────────────────────────────────────────── */
.scroll-box {
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--hull) transparent;
}

/* ── Archetype Card ──────────────────────────────────────────── */
.archetype-grid { display:grid; gap:var(--gap-sm); }
.archetype-card {
  border: 2px solid var(--seam);
  border-radius: var(--radius);
  padding: var(--gap-md);
  background: rgba(8,16,24,0.6);
  cursor: pointer;
  transition: all 200ms ease;
}
.archetype-card:hover { border-color:var(--rivet); background:rgba(20,34,50,0.4); }
.archetype-card.selected {
  border-color: var(--lantern);
  background: rgba(200,169,110,0.05);
  box-shadow: 0 0 0 1px rgba(200,169,110,0.15);
}
.archetype-card .arch-icon {
  font-family:var(--font-signal);
  font-size:24px;
  color:var(--lantern);
  margin-bottom:var(--gap-sm);
  text-align:center;
}
.archetype-card .arch-name {
  font-family:var(--font-log);
  font-size:17px;
  color:var(--bone);
  text-align:center;
  margin-bottom:var(--gap-xs);
}
.archetype-card .arch-desc {
  font-size:12px;
  color:var(--pewter);
  text-align:center;
  line-height:1.5;
  margin-bottom:var(--gap-sm);
}
.archetype-card .arch-stats {
  font-family:var(--font-signal);
  font-size:11px;
  color:var(--slate);
  text-align:center;
}

/* ── Gameplay layout (mobile: stacked, desktop: side-by-side) ── */
.game-layout {
  display: grid;
  gap: var(--gap-sm);
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.game-main {
  min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--hull) transparent;
}
.game-side {
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.game-side .scroll-box {
  flex: 1;
  min-height: 0;
}

/* ── Action dock (pinned to bottom of gameplay view) ─────────── */
.action-dock {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 3px;
  padding-top: var(--gap-sm);
  border-top: 1px solid var(--hairline);
}
.action-dock .act {
  text-align: center;
  padding: 6px 4px;
  font-size: 11px;
  border-left-width: 3px;
}

/* ── Scene text (narrative voice) ────────────────────────────── */
.scene-text {
  font-family: var(--font-signal);
  font-size: 13px;
  color: var(--bone);
  line-height: 1.7;
  margin-bottom: var(--gap-md);
}

/* ── Dialogue layout ─────────────────────────────────────────── */
.dlg-header { display:flex; gap:var(--gap-md); align-items:flex-start; margin-bottom:var(--gap-md); }
.dlg-speaker {
  font-family:var(--font-log);
  font-size:15px;
  color:var(--lantern-hot);
  letter-spacing:0.03em;
}
.dlg-text {
  font-family:var(--font-signal);
  font-size:13px;
  color:var(--bone);
  line-height:1.7;
  margin-bottom:var(--gap-md);
}

/* ── GDD reference badge ─────────────────────────────────────── */
.gdd-ref {
  font-size:10px;
  color:var(--graphite);
  font-family:var(--font-signal);
  margin-top:var(--gap-md);
  padding-top:var(--gap-sm);
  border-top:1px solid var(--hairline);
}

/* ── Ending-specific mood backgrounds ────────────────────────── */
.ending-truth    .stage-card { border-color:rgba(255,255,255,0.2); }
.ending-truth    .stage-card h2 { color:var(--bone); }
.ending-keeper   .stage-card h2 { color:var(--lantern); }
.ending-loop     { background:linear-gradient(180deg,var(--night-ink),var(--void)); }
.ending-loop     .stage-card h2 { color:var(--rust); }
.ending-corrupt  { background:linear-gradient(180deg,rgba(20,40,24,0.3),var(--void)); }
.ending-corrupt  .stage-card h2 { color:var(--corruption); }
.ending-witness  .stage-card h2 { color:var(--lantern-hot); }

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE — Mobile-first, then wider
   ═══════════════════════════════════════════════════════════════ */
@media (min-width: 768px) {
  .archetype-grid { grid-template-columns: repeat(3,1fr); }
  .game-layout { grid-template-columns: 1.6fr 1fr; grid-template-rows: 1fr; }
  .action-dock { grid-template-columns: repeat(4,1fr); }
}
@media (min-width: 1024px) {
  #app { padding: var(--gap-md); }
}

/* ═══════════════════════════════════════════════════════════════
   REDUCED MOTION
   ═══════════════════════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  .star { animation:none !important; opacity:0.4; }
  .beam-wrap { animation:none !important; }
  * { transition-duration:0ms !important; }
}
</style>
</head>
<body>
<div id="app">
  <nav class="nav-rail" id="nav" aria-label="Screen navigator"></nav>
  <main class="screen" id="screen"></main>
  <div id="announcer" role="status" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   STATE MACHINE
   ═══════════════════════════════════════════════════════════════ */
const SCREENS = [
  { id:'title',       label:'Title',        gdd:'§5a' },
  { id:'archetype',   label:'Archetype',    gdd:'§5b' },
  { id:'gameplay',    label:'Day',          gdd:'§5c' },
  { id:'dialogue',    label:'Dialogue',     gdd:'§5c.2, §6.9' },
  { id:'journal',     label:'Journal',      gdd:'§5c.3' },
  { id:'map',         label:'Map',          gdd:'§5c.4' },
  { id:'status',      label:'Status',       gdd:'§5c.5' },
  { id:'archive',     label:'Codex',        gdd:'§5c.6' },
  { id:'desk',        label:'Desk',         gdd:'—' },
  { id:'puzzle',      label:'Puzzle',       gdd:'—' },
  { id:'night_safe',  label:'Night ☽',      gdd:'§5d' },
  { id:'night_dark',  label:'Night ☠',      gdd:'§5d' },
  { id:'vision',      label:'Vision',       gdd:'§5e' },
  { id:'death',       label:'Death',        gdd:'§5f' },
  { id:'ending1',     label:'End: Truth',   gdd:'§5g' },
  { id:'ending2',     label:'End: Keeper',  gdd:'§5g' },
  { id:'ending3',     label:'End: Loop',    gdd:'§5g' },
  { id:'ending4',     label:'End: Corrupt', gdd:'§5g' },
  { id:'ending5',     label:'End: Witness', gdd:'§5g' },
  { id:'pause',       label:'Pause',        gdd:'§5h' },
  { id:'settings',    label:'Settings',     gdd:'§10' },
];

const S = {
  screen: 'title',
  archetype: 'Seeker',
  sideTab: 'journal',
  journalSub: 'entries',
  dialVal: [3, 7, 1],
};

const $nav = document.getElementById('nav');
const $screen = document.getElementById('screen');
const $announcer = document.getElementById('announcer');

function go(id) {
  if (!SCREENS.find(s => s.id === id)) return;
  S.screen = id;
  render();
}

function render() {
  // Nav
  $nav.innerHTML = SCREENS.map(s =>
    `<button class="nav-pill" ${s.id===S.screen?'aria-current="true"':''} data-go="${s.id}">${s.label}</button>`
  ).join('');
  // Screen
  const fn = R[S.screen] || R.title;
  $screen.innerHTML = fn();
  // Announce screen change to assistive tech
  const meta = SCREENS.find(s => s.id === S.screen);
  if ($announcer && meta) $announcer.textContent = meta.label + ' screen';
  // Seed stars
  $screen.querySelectorAll('.starfield').forEach(seedStars);
}

function seedStars(el) {
  if (el.dataset.seeded) return;
  el.dataset.seeded = '1';
  const n = +(el.dataset.count || 80);
  let html = '';
  for (let i = 0; i < n; i++) {
    const x = (Math.random()*100).toFixed(1);
    const y = (Math.random()*100).toFixed(1);
    const t = (3 + Math.random()*4).toFixed(1);
    const d = (Math.random()*3).toFixed(1);
    html += `<span class="star" style="left:${x}%;top:${y}%;--t:${t}s;--d:${d}s"></span>`;
  }
  el.innerHTML = html;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Event delegation ────────────────────────────────────────────
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-go]');
  if (btn) { go(btn.dataset.go); return; }
  const arch = e.target.closest('[data-arch]');
  if (arch) { S.archetype = arch.dataset.arch; render(); return; }
  const tab = e.target.closest('[data-tab]');
  if (tab) { S.sideTab = tab.dataset.tab; render(); return; }
  const jtab = e.target.closest('[data-jtab]');
  if (jtab) { S.journalSub = jtab.dataset.jtab; render(); return; }
  const dial = e.target.closest('[data-dial]');
  if (dial) {
    const i = +dial.dataset.dial;
    const dir = +dial.dataset.dir;
    S.dialVal[i] = ((S.dialVal[i] + dir) % 10 + 10) % 10;
    render();
    return;
  }
});
document.addEventListener('keydown', e => {
  if (e.target.matches('input,textarea,select,[contenteditable]')) return;
  if (e.key === 'ArrowRight') { const i = SCREENS.findIndex(s=>s.id===S.screen); go(SCREENS[(i+1)%SCREENS.length].id); }
  if (e.key === 'ArrowLeft')  { const i = SCREENS.findIndex(s=>s.id===S.screen); go(SCREENS[(i-1+SCREENS.length)%SCREENS.length].id); }
});

/* ═══════════════════════════════════════════════════════════════
   SCREEN RENDERERS — one function per screen
   ═══════════════════════════════════════════════════════════════ */
const R = {};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 1. TITLE SCREEN [GDD §5a]
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
R.title = () => `
<div class="cinematic">
  <div class="starfield" data-count="100"></div>
  <div class="beam-wrap"></div>
  <div class="vignette"></div>
  <div class="lighthouse-sil">
    <div class="tower"><div class="lantern-room"></div></div>
    <div class="base"></div>
  </div>
  <div class="cin-card">
    <p class="panel-label">A Mystery in Loops</p>
    <h2>Echoes of the Lighthouse</h2>
    <p class="subtitle">You are the new Keeper. The journal is empty. The beam must not go dark. Something in the water remembers what you have forgotten.</p>
    <div class="actions">
      <button class="act" data-go="archetype">NEW GAME</button>
      <button class="act ghost">CONTINUE <span class="sub">Loop 8 · 73% Knowledge</span></button>
      <button class="act ghost">ABOUT</button>
    </div>
    <div class="gdd-ref">GDD §5a · Title Screen · Beam rotates 360° over 8s · Buttons fade in at t=1.0s</div>
  </div>
</div>`;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 2. ARCHETYPE SELECTION [GDD §5b]
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
R.archetype = () => {
  const archetypes = [
    { id:'Seeker',  icon:'⌕', desc:'Driven by curiosity. +2 Insight on first location discovery. Can use the Analyze action to reveal hidden hotspots.', stats:'INSIGHT: 60 · RESONANCE: 40' },
    { id:'Keeper',  icon:'☀', desc:'Protector of knowledge. +1 Resonance each time you seal an Insight. Can use Preserve to bank Insight without visiting the Archive.', stats:'INSIGHT: 50 · RESONANCE: 50' },
    { id:'Witness', icon:'◉', desc:'Observer of truth. Hidden hotspots visible by default. +10% detail in Journal entries. Can see NPC trust shifts in real time.', stats:'INSIGHT: 40 · RESONANCE: 60' },
  ];
  return `
  <div class="screen-pad">
    <div class="panel-label">Choose Your Path</div>
    <p style="font-family:var(--font-log);font-size:16px;color:var(--bone);margin-bottom:var(--gap-md);">Your archetype shapes how you experience each loop. There is no wrong choice — only different ways of seeing.</p>
    <div class="archetype-grid">
      ${archetypes.map(a => `
        <button class="archetype-card ${S.archetype===a.id?'selected':''}" data-arch="${a.id}">
          <div class="arch-icon">${a.icon}</div>
          <div class="arch-name">${a.id}</div>
          <div class="arch-desc">${a.desc}</div>
          <div class="arch-stats">${a.stats}</div>
        </button>
      `).join('')}
    </div>
    <div style="margin-top:var(--gap-md);">
      <button class="act" data-go="gameplay">BEGIN JOURNEY AS ${S.archetype.toUpperCase()}</button>
    </div>
    <div class="gdd-ref">GDD §5b · Card 180×360 · Selected: border insight-gold 3px · Confirm appears after selection</div>
  </div>`;
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 3. GAMEPLAY DAY [GDD §5c]
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
R.gameplay = () => `
<div class="screen-pad">
  <!-- HUD — pinned top [GDD §5c.2 Location Header] -->
  <div class="hud" style="flex-shrink:0">
    <div class="hud-cell"><span class="label">Loop</span><span class="value">8</span></div>
    <div class="hud-cell"><span class="label">Phase</span><span class="value">AFTERNOON</span></div>
    <div class="hud-cell"><span class="label">Hearts</span><span class="hearts">♥♥♡</span></div>
    <div class="hud-cell"><span class="label">Stamina</span><span class="value">7/10</span><div class="bar" style="margin-top:3px"><div class="bar-fill teal" style="width:70%"></div></div></div>
    <div class="hud-cell"><span class="label">Light</span><span class="value">58%</span><div class="bar" style="margin-top:3px"><div class="bar-fill amber" style="width:58%"></div></div></div>
    <div class="hud-cell"><span class="label">Insight</span><span class="value" style="color:var(--lantern)">◈ 72</span></div>
    <div class="hud-cell"><span class="label">Location</span><span class="value">Lighthouse Office</span></div>
    <div class="hud-cell"><span class="label">Day Timer</span><div class="bar" style="margin-top:6px"><div class="bar-fill blue" style="width:53%"></div></div></div>
  </div>

  <!-- Middle zone — fills available space, internal scroll only -->
  <div class="game-layout" style="margin-top:var(--gap-sm)">
    <div class="game-main">
      <div class="panel" style="margin-bottom:var(--gap-sm)">
        <div class="panel-label">Scene · Turn 14 / 30</div>
        <p class="scene-text">The office smells of brine and old paper. Ledgers line the shelves, their spines cracked from decades of use. The desk is covered in maritime charts, weighted down by a brass compass that no longer points true north.</p>
        <div class="chips" style="margin-top:var(--gap-sm)">
          <span class="chip">📋 Charts</span>
          <span class="chip">🧭 Compass</span>
          <span class="chip">📖 Ledger</span>
        </div>
      </div>
      <div class="panel-label">PRESENT</div>
      <button class="npc-row" data-go="dialogue">
        <div><div class="npc-name">Maren</div><div class="npc-sub">Tier 3 · Ready ●</div></div>
        <span class="npc-dots">◈◈◈○</span>
      </button>
      <button class="npc-row">
        <div><div class="npc-name">Dov</div><div class="npc-sub">Tier 2</div></div>
        <span class="npc-dots">◈◈○○</span>
      </button>
      <div class="panel-label" style="margin-top:var(--gap-sm)">EXAMINE</div>
      <button class="act ghost" style="margin-bottom:var(--gap-xs)">✓ Keeper's Diary (page 1)</button>
      <button class="act ghost" style="margin-bottom:var(--gap-xs)">Tide Ledger</button>
      <button class="act ghost">Lens Housing</button>
    </div>

    <!-- SIDEBAR — tabs switch content, no extra scroll -->
    <div class="game-side">
      <div class="tabs">
        ${['journal','map','status','archive'].map(t =>
          `<button class="tab ${S.sideTab===t?'on':''}" data-tab="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`
        ).join('')}
      </div>
      <div class="scroll-box">${sideContent()}</div>
    </div>
  </div>

  <!-- ACTION DOCK — pinned bottom [GDD §5c.7] -->
  <div class="action-dock">
    <button class="act">Cliffs · 1t</button>
    <button class="act">★ Mechanism · 2t 🔒</button>
    <button class="act ghost">⏸ Wait</button>
    <button class="act safe">◈ Light Beacon</button>
  </div>
</div>`;

function sideContent() {
  if (S.sideTab === 'journal') return journalContent();
  if (S.sideTab === 'map') return mapContent();
  if (S.sideTab === 'status') return statusContent();
  if (S.sideTab === 'archive') return archiveContent();
  return '';
}

function journalContent() {
  const subs = ['entries','threads','insights'];
  return `
    <div class="tabs" style="margin-bottom:var(--gap-sm)">
      ${subs.map(t => `<button class="tab ${S.journalSub===t?'on':''}" data-jtab="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
    </div>
    ${S.journalSub === 'entries' ? `
      <div class="entry active"><b>Loop 8 · Lighthouse Office</b><span>Maren left a note under the tide chart: "The beam does not warn. It calls."</span></div>
      <div class="entry"><b>Loop 8 · Harbour</b><span>Cael's ledger has pages salted shut. The low-tide entries are deliberately hidden.</span></div>
      <div class="entry"><b>Loop 7 · Chapel</b><span>Oren admits the first keepers did not build a warning light. They built a feeding apparatus.</span></div>
      <div class="entry"><b>Loop 7 · Forge</b><span>Dov found markings on the mechanism gear that don't match any lighthouse manufacturer.</span></div>
    ` : S.journalSub === 'threads' ? `
      <div class="entry active"><b>The Lighthouse Chain</b><span>Key Insights sealed: 5/7</span>
        <div class="bar" style="margin-top:4px"><div class="bar-fill amber" style="width:71%"></div></div>
      </div>
      <div class="entry active"><b>Maren's Loss</b><span>Evidence: 3/5 — Need Beacon Room entry</span>
        <div class="bar" style="margin-top:4px"><div class="bar-fill amber" style="width:60%"></div></div>
      </div>
      <div class="entry"><b>The Fisherman's Ledger</b><span>✓ Complete</span></div>
    ` : `
      <div class="insight-grid">
        <div class="insight-card sealed"><div class="ic-icon">☀</div><div class="ic-title">The Beam Calls</div><div class="ic-status">SEALED</div></div>
        <div class="insight-card sealed"><div class="ic-icon">⚓</div><div class="ic-title">Spirit Binding</div><div class="ic-status">SEALED</div></div>
        <div class="insight-card"><div class="ic-icon">⚙</div><div class="ic-title">Mechanism Purpose</div><div class="ic-status">3/5 Evidence</div></div>
        <div class="insight-card"><div class="ic-icon">🏝</div><div class="ic-title">Island History</div><div class="ic-status">2/5 Evidence</div></div>
      </div>
    `}
  `;
}

function mapContent() {
  return `
    <div class="map-grid">
      <div class="map-node here">Lighthouse ◀</div>
      <div class="map-node">Cliffs</div>
      <div class="map-node">Harbour</div>
      <div class="map-node">Village</div>
      <div class="map-node">Chapel</div>
      <div class="map-node">Forge</div>
      <div class="map-node">Apothecary</div>
      <div class="map-node">Manor Ruins</div>
      <div class="map-node fog">??? Mechanism</div>
    </div>
    <div style="margin-top:var(--gap-sm);font-size:11px;color:var(--graphite)">
      Tap a location to see travel cost. Dashed = undiscovered.
    </div>`;
}

function statusContent() {
  return `
    <div class="panel" style="margin-bottom:var(--gap-sm)">
      <div style="display:flex;align-items:center;gap:var(--gap-md)">
        <div style="font-size:28px">⌕</div>
        <div>
          <div style="font-family:var(--font-log);font-size:15px;color:var(--bone)">${S.archetype}</div>

function endingScreen(cls, title, subtitle, text, npcs) {
  const npcHtml = Object.keys(npcs).length > 0
    ? `<div style="text-align:left;margin-top:var(--gap-md)"><div class="panel-label">Consequences</div>${Object.entries(npcs).map(([name,fate])=>`<div class="entry"><b>${name.charAt(0).toUpperCase()+name.slice(1)}</b><span>${fate}</span></div>`).join('')}</div>`
    : '';
  return `
  <div class="stage ${cls}">
    <div class="starfield" data-count="60"></div>
    <div class="vignette"></div>
    <div class="stage-card">
      <div class="panel-label">${esc(subtitle)}</div>
      <h2>${esc(title)}</h2>
      <div class="desc">${esc(text)}</div>
      <div class="panel" style="text-align:left;margin:0 auto;max-width:300px"><div style="font-family:var(--font-signal);font-size:12px;color:var(--pewter)">Knowledge Discovered: 84%<br>Insights Sealed: 5 / 7<br>Loops Completed: 8<br>NPCs at max trust: 3</div></div>
      ${npcHtml}
      <div style="margin-top:var(--gap-md)"><button class="act ghost" data-go="title">RETURN TO LIGHTHOUSE</button></div>
      <div class="gdd-ref">GDD §5g · Each ending has unique bg/beam/mood · Credits after 8s · SPACE to return</div>
    </div>
  </div>`;
}
