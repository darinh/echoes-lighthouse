<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Echoes of the Lighthouse — UI Mockup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@300;400&display=swap');

:root {
  /* COLD OCEAN — the world outside the lantern's reach */
  --ocean-deep: #050a0f;
  --ocean-mid: #0a1520;
  --ocean-surface: #0f1c2a;
  --ocean-shallow: #142434;

  /* THE LANTERN — the only warmth in the dark */
  --amber: #c8a96e;
  --amber-bright: #dfc080;
  --amber-dim: #8a7040;
  --amber-glow: rgba(200,169,110,0.10);

  /* SIGNAL COLORS */
  --teal: #4a9e8a;
  --teal-dim: #2e6e5e;
  --crimson: #7a3030;
  --crimson-dim: #4e1e1e;
  --bruise: #2e2444;
  --bile: #4a7040;

  /* TEXT — steel blue-grey, cold like the instruments */
  --text: #8a9bb0;
  --text-bright: #c0cad8;
  --text-dim: #5a6a7e;
  --text-gone: #3a4858;

  /* BORDERS — deep navy, the edges of instruments */
  --border: #2a3c50;
  --border-soft: #1a2a3a;
  --border-faint: rgba(42,60,80,0.3);

  /* TYPE */
  --font-display: "IM Fell English","Georgia",serif;
  --font-body: "Crimson Pro","Georgia",serif;
  --font-data: "JetBrains Mono","Consolas",monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--ocean-deep);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;font-weight:300}
body{
  min-height:100%;
  background:var(--ocean-deep);
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.03;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input[type="range"]{accent-color:var(--amber)}
:focus-visible{outline:1px solid var(--amber);outline-offset:2px}

/* ═══ SHELL ═══ */
#app{max-width:960px;margin:0 auto;padding:6px;display:flex;flex-direction:column;gap:4px;height:100dvh;height:100vh;overflow:hidden}

/* ═══ NAV ═══ */
.nav{display:flex;gap:1px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.nav::-webkit-scrollbar{display:none}
.nav-tab{
  flex-shrink:0;padding:4px 10px;min-height:28px;
  font-family:var(--font-data);font-size:10px;font-weight:300;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text-dim);border-bottom:2px solid transparent;background:none;transition:color 100ms,border-color 100ms;
}
.nav-tab:hover{color:var(--text)}
.nav-tab[aria-current="true"]{color:var(--amber);border-bottom-color:var(--amber-dim)}

/* ═══ SCREEN ═══ */
.screen{flex:1;min-height:0;border:1px solid var(--border-soft);background:var(--ocean-mid);overflow:hidden;position:relative;display:flex;flex-direction:column}
.screen::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 70% at 50% 45%,transparent 30%,var(--ocean-deep) 100%);z-index:1}
.screen>*{position:relative;z-index:2}
.pad{padding:12px;flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

/* ═══ BUTTONS — left accent strip + gradient fill ═══ */
.act{
  display:block;width:100%;text-align:left;
  padding:7px 12px;min-height:34px;
  border:1px solid var(--border-faint);
  border-left:3px solid var(--amber-dim);
  background:linear-gradient(135deg,rgba(200,169,110,0.10) 0%,rgba(200,169,110,0.02) 100%);
  color:var(--text-bright);font-size:12px;line-height:1.3;
  transition:background 100ms,border-color 100ms,color 100ms;
}
.act:hover{background:linear-gradient(135deg,rgba(200,169,110,0.18) 0%,rgba(200,169,110,0.05) 100%);border-color:var(--border);border-left-color:var(--amber);color:var(--amber-bright)}
.act.safe{border-left-color:var(--teal-dim);background:linear-gradient(135deg,rgba(74,158,138,0.08) 0%,transparent 100%)}
.act.safe:hover{border-left-color:var(--teal);color:var(--teal)}
.act.danger{border-left-color:var(--crimson-dim);background:linear-gradient(135deg,rgba(122,48,48,0.08) 0%,transparent 100%)}
.act.danger:hover{border-left-color:var(--crimson);color:#c06060}
.act.ghost{background:none;border-color:var(--border-soft);border-left-color:var(--border-soft);color:var(--text-dim)}
.act.ghost:hover{color:var(--text);border-left-color:var(--border)}
.act .cost{float:right;font-family:var(--font-data);font-size:10px;color:#c06060}
.act .gain{float:right;font-family:var(--font-data);font-size:10px;color:var(--teal)}
.act .sub{display:block;font-size:11px;color:var(--text-dim);font-weight:300}
.act[disabled]{opacity:0.3;pointer-events:none}

/* ═══ PANEL ═══ */
.panel{border:1px solid var(--border-soft);background:rgba(10,21,32,0.6);padding:10px}

/* ═══ TYPOGRAPHY ═══ */
.title{font-family:var(--font-display);font-size:22px;color:var(--text-bright);letter-spacing:0.02em;line-height:1.2}
.subtitle{font-family:var(--font-display);font-style:italic;font-size:13px;color:var(--text)}
.heading{font-family:var(--font-data);font-size:10px;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.body-text{font-family:var(--font-body);font-size:14px;font-weight:300;color:var(--text-bright);line-height:1.65}
.log-text{font-family:var(--font-data);font-size:12px;font-weight:300;color:var(--text);line-height:1.6}

/* ═══ RULES ═══ */
.rule{height:1px;background:var(--border-soft);margin:8px 0}
.rule-double{border-top:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);height:0;padding-top:2px;margin:10px 0}
.rule-ornament{text-align:center;font-family:var(--font-display);font-size:11px;color:var(--text-gone);margin:8px 0;letter-spacing:0.3em}

/* ═══ HUD — minimal instrument readings, no chrome ═══ */
.hud{display:flex;flex-wrap:wrap;gap:2px 12px;padding:6px 10px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
.hud-cell{display:flex;align-items:baseline;gap:4px}
.hud-cell .lbl{font-family:var(--font-data);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim)}
.hud-cell .val{font-family:var(--font-data);font-size:12px;color:var(--text-bright)}

/* ═══ BAR ═══ */
.bar{height:4px;background:var(--ocean-surface);overflow:hidden}
.bar-fill{height:100%;transition:width 400ms ease}
.bar-fill.amber{background:var(--amber-dim)}
.bar-fill.teal{background:var(--teal-dim)}
.bar-fill.blue{background:var(--bruise)}

/* ═══ ENTRY ═══ */
.entry{border-left:2px solid var(--border-soft);padding:4px 10px;margin-bottom:3px}
.entry b{display:block;font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-bright)}
.entry span{font-size:12px;color:var(--text-dim);font-weight:300}
.entry.sealed{border-left-color:var(--amber-dim)}
.entry.active{border-left-color:var(--amber-dim)}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:1px;margin-bottom:8px}
.tab{flex:1;padding:5px 4px;text-align:center;font-family:var(--font-data);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border-soft);background:none;min-height:28px;transition:color 100ms,border-color 100ms}
.tab:hover{color:var(--text)}
.tab.on{color:var(--amber);border-bottom-color:var(--amber-dim)}

/* ═══ NPC ROW ═══ */
.npc-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border:1px solid var(--border-soft);background:linear-gradient(135deg,rgba(200,169,110,0.04),transparent);margin-bottom:2px;cursor:pointer;transition:border-color 100ms;min-height:34px;width:100%;text-align:left}
.npc-row:hover{border-color:var(--border)}
.npc-name{font-size:13px;color:var(--text-bright)}
.npc-sub{font-size:10px;color:var(--text-dim)}
.npc-dots{color:var(--amber-dim);font-size:10px;letter-spacing:2px;font-family:var(--font-data)}

/* ═══ CHIP ═══ */
.chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{padding:2px 8px;border:1px solid var(--border-soft);font-family:var(--font-data);font-size:10px;color:var(--text);cursor:pointer;transition:border-color 100ms,color 100ms}
.chip:hover{border-color:var(--amber-dim);color:var(--amber)}

/* ═══ MAP ═══ */
.map-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.map-node{min-height:44px;border:1px solid var(--border-soft);background:var(--ocean-surface);display:flex;align-items:center;justify-content:center;text-align:center;font-family:var(--font-data);font-size:10px;color:var(--text-dim);padding:4px;cursor:pointer;transition:border-color 100ms}
.map-node:hover{border-color:var(--border);color:var(--text)}
.map-node.here{border-color:var(--amber-dim);color:var(--amber)}
.map-node.fog{border-style:dashed;color:var(--text-gone)}

/* ═══ INSIGHT CARDS ═══ */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.insight-card{border:1px solid var(--border-soft);padding:6px 8px;text-align:center}
.insight-card.sealed{border-color:var(--amber-dim)}
.insight-card .ic-icon{font-size:16px;color:var(--amber-dim)}
.insight-card .ic-title{font-family:var(--font-body);font-size:11px;color:var(--text-bright)}
.insight-card .ic-status{font-family:var(--font-data);font-size:9px;color:var(--text-dim)}
.insight-card.sealed .ic-status{color:var(--amber-dim)}

/* ═══ SEAL ROW ═══ */
.seal-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border:1px solid var(--border-soft);margin-bottom:2px;min-height:32px}
.seal-row.can-seal{cursor:pointer}.seal-row.can-seal:hover{border-color:var(--border)}
.seal-row.done{opacity:0.35}
.seal-title{font-size:12px;color:var(--text-bright)}
.seal-cost{font-family:var(--font-data);font-size:10px;color:var(--amber-dim)}
.seal-cost.locked{color:var(--text-gone)}

/* ═══ DIAL ═══ */
.dials{display:flex;gap:16px;justify-content:center}
.dial{display:flex;flex-direction:column;align-items:center;gap:3px}
.dial-btn{width:36px;height:36px;border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:14px;transition:border-color 100ms}
.dial-btn:hover{border-color:var(--amber-dim);color:var(--amber)}
.dial-val{font-family:var(--font-data);font-size:24px;color:var(--amber)}

/* ═══ CODEX ═══ */
.codex-entry{border:1px solid var(--border-soft);padding:6px 8px;margin-bottom:3px}
.codex-entry.unlocked{border-left:2px solid var(--amber-dim)}
.codex-entry .ce-title{font-size:12px;color:var(--text-bright)}
.codex-entry .ce-body{font-size:11px;color:var(--text-dim);font-weight:300}
.codex-bar{display:flex;align-items:center;gap:6px;margin-bottom:4px}

/* ═══ SETTINGS ═══ */
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px solid var(--border-faint)}
.setting-row label,.setting-row span{font-size:12px;color:var(--text-bright)}
.setting-row input[type="range"]{flex:1;max-width:140px}

/* ═══ TRUST DOTS ═══ */
.trust-dots{display:flex;gap:3px}
.trust-dot{width:6px;height:6px;border:1px solid var(--text-gone)}
.trust-dot.filled{background:var(--amber-dim);border-color:var(--amber-dim)}

/* ═══ PORTRAIT ═══ */
.portrait{width:48px;min-height:48px;border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center;font-family:var(--font-data);font-size:9px;line-height:1.1;color:var(--amber-dim);white-space:pre;flex-shrink:0}

/* ═══ SCROLL ═══ */
.scroll-box{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--ocean-surface) transparent}

/* ═══ ATMOSPHERIC ═══ */
.starfield{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.star{position:absolute;width:1px;height:1px;background:var(--text-dim);animation:flicker var(--t,5s) ease-in-out infinite;animation-delay:var(--d,0s)}
@keyframes flicker{0%,100%{opacity:0.1}40%{opacity:0.5}60%{opacity:0.15}80%{opacity:0.4}}

.beam-wrap{position:absolute;inset:0;pointer-events:none;transform-origin:50% 68%;animation:sweep 12s ease-in-out infinite alternate}
.beam-wrap::before{content:"";position:absolute;left:44%;top:10%;width:min(70vw,350px);height:min(70vw,350px);background:conic-gradient(from 20deg,transparent 0deg 320deg,rgba(200,169,110,0.25) 345deg 360deg)}
@keyframes sweep{from{transform:rotate(-18deg)}to{transform:rotate(22deg)}}

.vignette{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 65% 55% at 50% 40%,transparent 20%,rgba(5,10,15,0.9) 100%)}
.lighthouse-sil{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);pointer-events:none;opacity:0.4}
.lighthouse-sil .tower{width:30px;height:120px;margin:0 auto;border:1px solid var(--text-gone);background:linear-gradient(180deg,rgba(200,169,110,0.05),transparent 60%);position:relative}
.lighthouse-sil .lantern-room{position:absolute;top:-10px;left:-4px;right:-4px;height:12px;border:1px solid var(--text-gone);background:rgba(200,169,110,0.10)}
.lighthouse-sil .base{width:44px;height:14px;margin:0 auto;border:1px solid var(--text-gone);border-top:none}
.scanlines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(138,155,176,0.02) 0px,rgba(138,155,176,0.02) 1px,transparent 1px,transparent 3px)}

/* ═══ LAYOUTS ═══ */
.cinematic{flex:1;min-height:0;display:flex;align-items:flex-end;justify-content:center;position:relative;overflow:hidden}
.cin-card{position:relative;z-index:2;width:min(540px,100%);margin:10px;border:1px solid var(--border-soft);background:rgba(5,10,15,0.85);padding:16px;max-height:80%;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--ocean-surface) transparent}
.stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.stage-card{position:relative;z-index:2;width:min(480px,100%);margin:10px;border:1px solid var(--border-soft);background:rgba(5,10,15,0.85);padding:16px;text-align:center;max-height:85%;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--ocean-surface) transparent}
.cin-card .actions,.stage-card .actions{display:grid;gap:3px;margin-top:10px}

.game-layout{display:grid;gap:4px;flex:1;min-height:0;overflow:hidden;position:relative}
.game-main{min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--ocean-surface) transparent}
/* Mobile default: hide inline sidebar, show rail */
.game-side{display:none}
/* ═══ SIDE PANEL — vertical tab rail on mobile, inline on desktop ═══ */
.game-side{min-height:0;display:flex;flex-direction:column}
.game-side .scroll-box{flex:1;min-height:0}

/* Mobile: tab rail is vertical strip on right edge, panel floats */
.side-rail{
  position:absolute;right:0;top:0;bottom:0;z-index:10;
  display:flex;flex-direction:column;gap:1px;padding:4px 0;
}
.side-rail .tab{
  writing-mode:vertical-lr;text-orientation:mixed;
  padding:10px 5px;min-height:auto;min-width:28px;
  border-bottom:none;border-left:1px solid var(--border-soft);
  font-size:9px;
}
.side-rail .tab.on{border-left-color:var(--amber-dim)}
.side-float{
  position:absolute;right:30px;top:0;bottom:0;z-index:9;
  width:min(280px,calc(100% - 40px));
  border-left:1px solid var(--border-soft);
  background:rgba(5,10,15,0.95);
  display:flex;flex-direction:column;
  padding:8px;
  overflow:hidden;
}
.side-float .scroll-box{flex:1;min-height:0}
.side-float-close{
  position:absolute;top:4px;right:4px;z-index:1;
  font-family:var(--font-data);font-size:10px;color:var(--text-dim);
  padding:4px 6px;
}
.side-float-close:hover{color:var(--text)}

.action-dock{flex-shrink:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:2px;padding-top:6px;border-top:1px solid var(--border-soft)}
.action-dock .act{text-align:center;font-size:11px;padding:5px 4px}

/* ═══ ENDING MOODS ═══ */
.ending-truth .stage-card{border-color:rgba(192,202,216,0.2)}
.ending-keeper .stage-card .title{color:var(--amber)}
.ending-loop{background:var(--bruise)}
.ending-loop .stage-card .title{color:#c06060}
.ending-corrupt{background:linear-gradient(180deg,rgba(20,40,24,0.3),var(--ocean-deep))}
.ending-corrupt .stage-card .title{color:var(--bile)}
.ending-witness .stage-card .title{color:var(--amber-dim)}

/* Desktop: revert to inline sidebar (hide rail/float, show .game-side) */
@media(min-width:768px){
  .side-rail{display:none}
  .side-float{display:none!important}
  .game-side{display:flex!important}
  .game-layout{grid-template-columns:1.5fr 1fr}
  .action-dock{grid-template-columns:repeat(4,1fr)}
}
@media(prefers-reduced-motion:reduce){.star{animation:none!important;opacity:0.3}.beam-wrap{animation:none!important}*{transition-duration:0ms!important}}
</style>

<body>
<div id="app">
  <nav class="nav" id="nav" aria-label="Screen navigator"></nav>
  <main class="screen" id="screen"></main>
  <div id="ann" role="status" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap"></div>
</div>
<script>
const SCREENS=[
  {id:'title',label:'Title'},{id:'archetype',label:'Archetype'},{id:'gameplay',label:'Day'},
  {id:'dialogue',label:'Dialogue'},{id:'journal',label:'Journal'},{id:'map',label:'Map'},
  {id:'status',label:'Status'},{id:'archive',label:'Codex'},{id:'desk',label:'Desk'},
  {id:'puzzle',label:'Puzzle'},{id:'night_safe',label:'Night ☽'},{id:'night_dark',label:'Night ☠'},
  {id:'vision',label:'Vision'},{id:'death',label:'Death'},
  {id:'ending1',label:'End:Truth'},{id:'ending2',label:'End:Keeper'},{id:'ending3',label:'End:Loop'},
  {id:'ending4',label:'End:Corrupt'},{id:'ending5',label:'End:Witness'},
  {id:'pause',label:'Pause'},{id:'settings',label:'Settings'},
];
const S={screen:'title',archetype:'Seeker',sideTab:'journal',sideOpen:false,journalSub:'entries',dialVal:[3,7,1]};
const $n=document.getElementById('nav'),$s=document.getElementById('screen'),$a=document.getElementById('ann');

function go(id){if(SCREENS.find(s=>s.id===id)){S.screen=id;render()}}
function render(){
  $n.innerHTML=SCREENS.map(s=>`<button class="nav-tab"${s.id===S.screen?' aria-current="true"':''} data-go="${s.id}">${s.label}</button>`).join('');
  $s.innerHTML=(R[S.screen]||R.title)();
  $s.querySelectorAll('.starfield').forEach(el=>{
    if(el.dataset.s)return;el.dataset.s='1';
    let h='';for(let i=0;i<+(el.dataset.n||70);i++){const x=(Math.random()*100).toFixed(1),y=(Math.random()*100).toFixed(1),t=(4+Math.random()*5).toFixed(1),d=(Math.random()*4).toFixed(1);h+=`<span class="star" style="left:${x}%;top:${y}%;--t:${t}s;--d:${d}s"></span>`}el.innerHTML=h;
  });
  if($a){const m=SCREENS.find(s=>s.id===S.screen);if(m)$a.textContent=m.label+' screen'}
}
document.addEventListener('click',e=>{
  const g=e.target.closest('[data-go]');if(g){go(g.dataset.go);return}
  const a=e.target.closest('[data-arch]');if(a){S.archetype=a.dataset.arch;render();return}
  const t=e.target.closest('[data-tab]');if(t){if(S.sideTab===t.dataset.tab&&S.sideOpen){S.sideOpen=false}else{S.sideTab=t.dataset.tab;S.sideOpen=true}render();return}
  const sc=e.target.closest('[data-side-close]');if(sc){S.sideOpen=false;render();return}
  const j=e.target.closest('[data-jtab]');if(j){S.journalSub=j.dataset.jtab;render();return}
  const d=e.target.closest('[data-dial]');if(d){S.dialVal[+d.dataset.dial]=((S.dialVal[+d.dataset.dial]+(+d.dataset.dir))%10+10)%10;render();return}
});
document.addEventListener('keydown',e=>{
  if(e.target.matches('input,textarea,select,[contenteditable]'))return;
  const i=SCREENS.findIndex(s=>s.id===S.screen);
  if(e.key==='ArrowRight')go(SCREENS[(i+1)%SCREENS.length].id);

  <p class="body-text" style="font-style:italic;font-size:13px;margin:8px 0">Caught at the harbour. The lighthouse is dark. Something large moves. The pier boards creak beneath your feet, though you are standing still.</p>
  <div class="actions"><button class="act danger">Try to hide</button><button class="act danger">Accept fate</button></div></div>
</div>`;

R.vision=()=>`<div class="stage" style="background:linear-gradient(180deg,var(--ocean-deep),var(--bruise))">
  <div class="vignette"></div><div class="lighthouse-sil" style="opacity:0.08"></div>
  <div style="position:relative;z-index:2;text-align:center;padding:20px">
    <div style="font-family:var(--font-body);font-size:15px;font-weight:300;font-style:italic;color:var(--text-bright);line-height:2.2;text-shadow:0 0 16px rgba(200,169,110,0.15)">
      A hand reaches for the lamp.<br><br>The glass is cold. The wick is dry.<br><br>The flame will not catch.<br><br>You hear footsteps on the stair.<br><br><span style="color:var(--amber)">They are not your footsteps.</span>
    </div>
    <div style="margin-top:20px;font-family:var(--font-data);font-size:10px;color:var(--text-gone)">Press SPACE to continue</div>
  </div>
</div>`;

R.death=()=>`<div class="stage" style="background:var(--ocean-deep)"><div class="scanlines"></div>
  <div class="stage-card"><div class="rule-ornament">— ✦ —</div><div class="title" style="color:#c06060;letter-spacing:0.15em;font-size:clamp(18px,4vw,28px)">THE LOOP CLOSES</div><div class="rule-double"></div>
  <p class="body-text" style="font-style:italic;font-size:13px;margin-bottom:10px">You reached the cliffs after dark. The signal failed. The island remembered you before you remembered yourself.</p>
  <div class="panel" style="text-align:left;max-width:200px;margin:0 auto 10px"><div class="log-text">Loop: 8<br>Sealed: 5/7<br>Locations: 9/12<br>Resonance: 134</div></div>
  <div class="actions" style="max-width:240px;margin:0 auto"><button class="act">Begin Again (Loop 9)</button><button class="act ghost" data-go="title">Return to Title</button></div></div>
</div>`;

function ending(cls,orn,t,sub,txt,npcs){
  const nh=Object.keys(npcs||{}).length?`<div class="rule"></div><div class="heading">Consequences</div>${Object.entries(npcs).map(([n,f])=>`<div class="entry"><b>${n}</b><span>${f}</span></div>`).join('')}`:'';
  return `<div class="stage ${cls}"><div class="starfield" data-n="40"></div><div class="vignette"></div>
  <div class="stage-card"><div class="rule-ornament">${orn}</div><div class="title">${t}</div><div class="subtitle" style="margin:2px 0 8px">${sub}</div><div class="rule-double"></div>
  <p class="body-text" style="font-style:italic;font-size:13px">${txt}</p>
  <div class="panel" style="text-align:left;max-width:200px;margin:10px auto"><div class="log-text">Knowledge: 84%<br>Sealed: 5/7<br>Loops: 8</div></div>
  ${nh}<div style="margin-top:8px"><button class="act ghost" data-go="title">Return to Lighthouse</button></div></div></div>`;
}
R.ending1=()=>ending('ending-truth','— The Truth —','Echoes Silenced','You sent the final signal.','The frequency rippled through stone and water. The Vael stirred once — and was free. The beam no longer sweeps. The lighthouse stands dark. For the first time in centuries, the island is simply an island.',{Maren:"Found peace in her father's words",Dov:'Rebuilt the mechanism room as a museum',Vael:'Returned to the deep, no longer hungry'});
R.ending2=()=>ending('ending-keeper','— The Sacrifice —','The Keeper Remains','You chose to stay.','The mechanism hums. The beam sweeps. The Vael feeds on schedule. You will not age. You will not leave. But the journal is full, and someday another keeper will read it.',{Maren:'Visits the lighthouse each dawn',Dov:'Maintains the mechanism in silence'});
R.ending3=()=>ending('ending-loop','— The Loop —','Echoes Eternal','You failed to break the cycle.','Dawn comes again. The cottage. The empty journal. "Keep the light burning." But this time the handwriting is yours.',{});
R.ending4=()=>ending('ending-corrupt','— The Corruption —','The Lighthouse Drowns','You accepted the gift.','Power flowed. The beam turned green. The feeding intensified. The island sinks into water that glows with something never meant to surface.',{Maren:'Fled on the last boat',Vael:'Merged with you. You are the new hunger.'});
R.ending5=()=>ending('ending-witness','— The Witness —','The Story Continues','You chose neither to save nor condemn.','You observed. You recorded. The journal is the most complete account ever written. The mystery persists. But now someone knows.',{Maren:'Reads the journal each evening',Silas:'Publishes a sanitized version'});

R.pause=()=>`<div class="stage"><div style="position:absolute;inset:0;background:rgba(5,10,15,0.94)"></div>
  <div style="position:relative;z-index:2;width:min(300px,90vw);border:1px solid var(--border-soft);background:var(--ocean-mid);padding:16px">
    <div class="title" style="text-align:center;font-size:16px;letter-spacing:0.1em;margin-bottom:10px">Paused</div><div class="rule-ornament">— ✦ —</div>
    <div style="display:grid;gap:3px"><button class="act" data-go="gameplay">Resume</button><button class="act ghost">Save Game</button><button class="act ghost" data-go="settings">Settings</button><button class="act ghost" data-go="title">Quit to Title</button></div>
  </div>
</div>`;

R.settings=()=>`<div class="pad">
  <div style="display:flex;justify-content:space-between;align-items:baseline"><div class="heading" style="margin:0">Settings</div><button class="act ghost" style="width:auto;padding:3px 10px;min-height:24px;font-size:11px" data-go="gameplay">✕</button></div><div class="rule"></div>
  <div class="panel">
    <div class="setting-row"><label for="vm">Master Volume</label><input id="vm" type="range" min="0" max="100" value="75"></div>
    <div class="setting-row"><label for="va">Ambient</label><input id="va" type="range" min="0" max="100" value="60"></div>
    <div class="setting-row"><label for="vu">UI</label><input id="vu" type="range" min="0" max="100" value="80"></div>
    <div class="setting-row"><label for="vn">Narrative</label><input id="vn" type="range" min="0" max="100" value="70"></div>
    <div class="setting-row"><span>Reduce Motion</span><button class="act ghost" style="width:auto;padding:3px 10px;min-height:28px;font-size:11px" aria-label="Reduce motion: off">Off</button></div>
    <div class="setting-row"><span>Text Scale</span><div class="tabs" role="group" aria-label="Text scale" style="margin:0;gap:1px;flex:0"><button class="tab" style="padding:3px 8px;min-height:28px">0.8×</button><button class="tab on" style="padding:3px 8px;min-height:28px" aria-pressed="true">1.0×</button><button class="tab" style="padding:3px 8px;min-height:28px">1.2×</button><button class="tab" style="padding:3px 8px;min-height:28px">1.5×</button></div></div>
    <div class="setting-row" style="border:none"><span>Clear Save</span><button class="act danger" style="width:auto;padding:3px 10px;min-height:28px;font-size:11px">Clear</button></div>
  </div>
</div>`;

window.__HANDOFF__={
  aesthetic:'Deep Nautical Gothic — amber lantern light on cold ocean dark',
  palette:{bg:['#050a0f','#0a1520'],accent:'#c8a96e',safe:'#4a9e8a',danger:'muted crimson',text:'#8a9bb0',borders:['#2a3c50','#1a2a3a']},
  buttons:'left accent strip + gradient fill, left-aligned text, weighted visually left',
  fonts:['IM Fell English (display)','Crimson Pro (body)','JetBrains Mono (data)'],

  productionMapping:{title:'UIManager.updateTitleUI',gameplay:'UIManager.updateHUD+renderLocationPanel+renderActionPanel',dialogue:'UIManager.renderDialogue',journal:'UIManager.renderJournal',map:'UIManager.renderMapOverlay',status:'UIManager.updateHUD',archive:'UIManager.renderCodex',desk:'UIManager.archiveDeskHTML',puzzle:'UIManager.signalPuzzleHTML',night_safe:'UIManager.renderNightSafe',night_dark:'UIManager.renderNightDark',vision:'UIManager.renderVisionScreen',death:'UIManager.renderDeathScreen',ending1:'UIManager.renderEndingScreen',pause:'UIManager.renderSettings(overlay)',settings:'UIManager.renderSettings'},
};
render();
</script>
</body>
